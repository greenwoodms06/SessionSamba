name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-flight deploy finish; queue at most one behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci
        env:
          # Belt and braces: current playwright has no install hook, but if a
          # future version adds one, CI has no use for browser binaries.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      # The data invariants live in the test suite, so a bad regenerate of
      # sessions.json fails the build rather than shipping quietly.
      - name: Test
        run: npm test

      - name: Resolve base path
        # Project Pages serve from /<repo>/. Derived from GITHUB_REPOSITORY rather
        # than github.event.repository, which is not populated on workflow_dispatch.
        run: echo "BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Verify the build produced a usable site
        # A base-path mistake yields a dist/ that 404s every asset — invisible
        # until someone opens the deployed page.
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -f dist/data/sessions.json || { echo "::error::conference data missing from dist"; exit 1; }
          grep -q "${BASE_PATH}assets/" dist/index.html \
            || { echo "::error::index.html does not reference ${BASE_PATH}assets/"; exit 1; }
          echo "dist/ looks correct for base ${BASE_PATH}"

      - uses: actions/configure-pages@v5
        with:
          # Turn Pages on if it isn't already, rather than failing with a 404.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
